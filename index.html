<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <meta
      name="description"
      content="Bankist is a modern demo banking dashboard for transfers, loans, and account management."
    />
    <meta name="theme-color" content="#0077b6" />
    <link rel="shortcut icon" type="image/png" href="/icon.png" />

    <link
      href="https://fonts.googleapis.com/css?family=Poppins:400,500,600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
    <title>Bankist</title>
  </head>
  <body>
    <!-- TOP NAVIGATION -->
    <nav>
      <p class="welcome">Log in to get started</p>
      <img src="logo.png" alt="Bankist logo" class="logo" />
      <form class="login">
        <label class="sr-only" for="login-user">Username</label>
        <input
          id="login-user"
          type="text"
          placeholder="USER"
          class="login__input login__input--user"
          autocomplete="username"
          required
        />
        <label class="sr-only" for="login-pin">PIN</label>
        <input
          id="login-pin"
          type="password"
          placeholder="PIN"
          maxlength="4"
          class="login__input login__input--pin"
          autocomplete="current-password"
          inputmode="numeric"
          required
        />
        <button class="login__btn" type="submit" aria-label="Log in">
          &rarr;
        </button>
      </form>
    </nav>

    <main class="app">
      <!-- BALANCE -->
      <div class="balance">
        <div>
          <p class="balance__label">Current balance</p>
          <p class="balance__date">
            As of <span class="date">05/03/2037</span>
          </p>
        </div>
        <p class="balance__value">0000€</p>
      </div>

      <!-- MOVEMENTS -->
      <div class="movements">
        <div class="movements__row">
          <div class="movements__type movements__type--deposit">2 deposit</div>
          <div class="movements__date">3 days ago</div>
          <div class="movements__value">4 000€</div>
        </div>
        <div class="movements__row">
          <div class="movements__type movements__type--withdrawal">
            1 withdrawal
          </div>
          <div class="movements__date">24/01/2037</div>
          <div class="movements__value">-378€</div>
        </div>
      </div>

      <!-- SUMMARY -->
      <div class="summary">
        <p class="summary__label">In</p>
        <p class="summary__value summary__value--in">0000€</p>
        <p class="summary__label">Out</p>
        <p class="summary__value summary__value--out">0000€</p>
        <p class="summary__label">Interest</p>
        <p class="summary__value summary__value--interest">0000€</p>
        <button class="btn--sort">&downarrow; SORT</button>
      </div>

      <!-- OPERATION: TRANSFERS -->
      <div class="operation operation--transfer">
        <h2>Transfer money</h2>
        <form class="form form--transfer">
          <input
            type="text"
            class="form__input form__input--to"
            aria-label="Transfer to user"
            required
          />
          <input
            type="number"
            class="form__input form__input--amount"
            aria-label="Transfer amount"
            required
          />
          <button class="form__btn form__btn--transfer" type="submit">&rarr;</button>
          <label class="form__label">Transfer to</label>
          <label class="form__label">Amount</label>
        </form>
      </div>

      <!-- OPERATION: LOAN -->
      <div class="operation operation--loan">
        <h2>Request loan</h2>
        <form class="form form--loan">
          <input
            type="number"
            class="form__input form__input--loan-amount"
            aria-label="Loan amount"
            required
          />
          <button class="form__btn form__btn--loan" type="submit">&rarr;</button>
          <label class="form__label form__label--loan">Amount</label>
        </form>
      </div>

      <!-- OPERATION: CLOSE -->
      <div class="operation operation--close">
        <h2>Close account</h2>
        <form class="form form--close">
          <input
            type="text"
            class="form__input form__input--user"
            aria-label="Confirm username"
            required
          />
          <input
            type="password"
            maxlength="4"
            class="form__input form__input--pin"
            aria-label="Confirm PIN"
            required
          />
          <button class="form__btn form__btn--close" type="submit">&rarr;</button>
          <label class="form__label">Confirm user</label>
          <label class="form__label">Confirm PIN</label>
        </form>
      </div>

      <!-- LOGOUT TIMER -->
      <p class="logout-timer">
        You will be logged out in <span class="timer">05:00</span>
      </p>
    </main>

    <footer>&copy; by Karthikraj M R.</footer>

    <script src="script.js"></script>
  </body>
</html>
